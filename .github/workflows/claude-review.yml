name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    name: Multi-perspective review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Automatically review every PR — no @claude mention needed
          trigger_phrase: ''
          direct_prompt: |
            Review this pull request from five perspectives:

            1. **Security**: Hardcoded secrets? Unvalidated input? Auth gaps? Client data in LLM prompts?
            2. **Architecture**: Layer violations? Business logic in wrong layer? Missing ADR for a significant decision?
            3. **Testing**: Domain logic without tests? Missing E2E for changed flows? flows.json updated?
            4. **Design/UX**: Semantic tokens used? Dark mode works? Missing states (loading/error/empty)?
            5. **Code quality**: Readable? Types tight (no `any`)? `eslint --max-warnings 0` passes? Conventional commit format?

            For each issue: state the file + line, severity (blocker/suggestion), and what to fix.
            End with: **Approved** or **Changes requested** + one sentence of reasoning.
